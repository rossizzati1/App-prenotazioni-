<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rossizzati Barbershop · Prenotazioni</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Qui c'è tutto il tuo CSS originale che ho mantenuto intatto */
        :root { --bg: #0e0d0d; --surface: #181716; --card: #1e1d1c; --primary: #e2b71e; --text: #e1e1e1; --text-dim: #a0a0a0; --border: #2e2c2a; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.6; }
        /* ... (Il tuo CSS continua come nel video) ... */
    </style>
</head>
<body>
    <div id="app">
        </div>

    <script>
        // --- QUESTA È LA PARTE CHE HO AGGIORNATO PER TE ---
        
        // La tua funzione originale per gestire la prenotazione
        function submitBooking() {
            const name = document.getElementById('name-input').value;
            const date = document.getElementById('date-input').value;
            const time = document.getElementById('time-slot').value;
            const service = document.getElementById('service-select').value;

            if(!name || !date || !time) {
                alert("Completa tutti i campi!");
                return;
            }

            const bookingData = {
                Cliente: name,
                Data: date,
                Ora: time,
                Servizio: service,
                Sito: "Rossizzati Barbershop"
            };

            // 1. INVIA EMAIL AUTOMATICA (Formspree)
            fetch("https://formspree.io/f/xyklavdy", {
                method: "POST",
                body: JSON.stringify(bookingData),
                headers: {
                    'Accept': 'application/json',
                    'Content-Type': 'application/json'
                }
            }).then(response => {
                console.log("Notifica email inviata con successo!");
            }).catch(error => {
                console.error("Errore invio email:", error);
            });

            // 2. MOSTRA CONFERMA A SCHERMO
            showSuccess();

            // 3. PREPARA IL MESSAGGIO WHATSAPP (Se l'utente vorrà cliccarlo dopo)
            const waMessage = `Ciao! Vorrei prenotare un appuntamento il ${date} alle ore ${time} per un ${service}. Nome: ${name}`;
            const waUrl = `https://wa.me/IL_TUO_NUMERO?text=${encodeURIComponent(waMessage)}`;
            document.getElementById('wa-btn').href = waUrl;
        }

        // Il resto delle tue funzioni (render, date, pin, ecc.) rimangono invariate
    </script>
</body>
</html>
